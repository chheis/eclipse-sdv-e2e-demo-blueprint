apiVersion: v0.1
workloads:
  mosquitto-broker:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    configs:
      mosquitto_conf: mosquitto_config
    files:
      - mountPoint: "/mosquitto/config/mosquitto.conf" # mount point in the container
        data: "{{mosquitto_conf}}" 
    runtimeConfig: |
      image: docker.io/eclipse-mosquitto:latest
      commandOptions: ["--net=host"]
  kuksa-databroker:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    runtimeConfig: |
      image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.6.0
      commandArgs: ["--insecure"]
      commandOptions: ["--net=host"]
      volumes:
        - /opt/kuksa/vss:/data:ro
  kuksa-can-provider:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    configs:
      can_provider_config: can_provider_config
      can_provider_mapping: can_provider_mapping
      can_provider_dbc: can_provider_dbc
      can_provider_defaults: can_provider_defaults
    files:
      - mountPoint: "/config/can-provider-config.ini"
        data: "{{can_provider_config}}"
      - mountPoint: "/config/motorbike-blinker-vss.json"
        data: "{{can_provider_mapping}}"
      - mountPoint: "/config/motorbike-blinker-command.dbc"
        data: "{{can_provider_dbc}}"
      - mountPoint: "/config/motorbike-blinker-defaults.json"
        data: "{{can_provider_defaults}}"
    runtimeConfig: |
      image: ghcr.io/eclipse-kuksa/kuksa-can-provider/can-provider:0.4.4
      network: host
      privileged: true
      commandArgs: ["--config", "/config/can-provider-config.ini"]
configs:
  mosquitto_config: |
    listener 1883 0.0.0.0
    allow_anonymous true
  can_provider_config: |
    [general]
    server_type = kuksa_databroker
    ip = 127.0.0.1
    port = 55555
    tls = False
    mapping = /config/motorbike-blinker-vss.json
    dbc2val = False
    val2dbc = True

    [can]
    port = can0
    dbcfile = /config/motorbike-blinker-command.dbc
    dbc_default_file = /config/motorbike-blinker-defaults.json
    j1939 = False
  can_provider_mapping: |
    {
      "Vehicle": {
        "type": "branch",
        "description": "High-level vehicle data.",
        "children": {
          "Body": {
            "type": "branch",
            "description": "Body-related signals.",
            "children": {
              "Lights": {
                "type": "branch",
                "description": "Exterior lights.",
                "children": {
                  "DirectionIndicator": {
                    "type": "branch",
                    "description": "Indicator lights.",
                    "children": {
                      "Left": {
                        "type": "branch",
                        "description": "Left indicator.",
                        "children": {
                          "IsSignaling": {
                            "datatype": "boolean",
                            "description": "Indicates if left indicator is signaling.",
                            "type": "actuator",
                            "vss2dbc": {
                              "signal": "DirectionIndicatorLeft"
                            }
                          }
                        }
                      },
                      "Right": {
                        "type": "branch",
                        "description": "Right indicator.",
                        "children": {
                          "IsSignaling": {
                            "datatype": "boolean",
                            "description": "Indicates if right indicator is signaling.",
                            "type": "actuator",
                            "vss2dbc": {
                              "signal": "DirectionIndicatorRight"
                            }
                          }
                        }
                      }
                    }
                  },
                  "Brake": {
                    "type": "branch",
                    "description": "Brake lights.",
                    "children": {
                      "IsActive": {
                        "allowed": [
                          "INACTIVE",
                          "ACTIVE",
                          "ADAPTIVE"
                        ],
                        "datatype": "string",
                        "description": "Indicates if brake-light is active.",
                        "type": "actuator",
                        "vss2dbc": {
                          "signal": "BrakeIsActive",
                          "transform": {
                            "mapping": [
                              {
                                "from": "INACTIVE",
                                "to": 0
                              },
                              {
                                "from": "ACTIVE",
                                "to": 1
                              },
                              {
                                "from": "ADAPTIVE",
                                "to": 1
                              }
                            ]
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  can_provider_dbc: |
    VERSION ""

    NS_ :
        NS_DESC_
        CM_
        BA_DEF_
        BA_
        VAL_
        CAT_DEF_
        CAT_
        FILTER
        BA_DEF_DEF_
        EV_DATA_
        ENVVAR_DATA_
        SGTYPE_
        SGTYPE_VAL_
        BA_DEF_SGTYPE_
        BA_SGTYPE_
        SIG_TYPE_REF_
        VAL_TABLE_
        SIG_GROUP_
        SIG_VALTYPE_
        SIGTYPE_VALTYPE_
        BO_TX_BU_
        BA_DEF_REL_
        BA_REL_
        BA_DEF_DEF_REL_
        BU_SG_REL_
        BU_EV_REL_
        BU_BO_REL_
        SG_MUL_VAL_

    BS_:

    BU_: RPI4 MCU1

    BO_ 288 BlinkerCommand: 1 RPI4
     SG_ DirectionIndicatorLeft : 0|1@1+ (1,0) [0|1] "" MCU1
     SG_ DirectionIndicatorRight : 1|1@1+ (1,0) [0|1] "" MCU1
     SG_ BrakeIsActive : 2|1@1+ (1,0) [0|1] "" MCU1

    CM_ BO_ 288 "VSS command frame for Vehicle.Body.Lights.DirectionIndicator.Left.IsSignaling, Right.IsSignaling, and Brake.IsActive.";
    CM_ SG_ 288 DirectionIndicatorLeft "Vehicle.Body.Lights.DirectionIndicator.Left.IsSignaling";
    CM_ SG_ 288 DirectionIndicatorRight "Vehicle.Body.Lights.DirectionIndicator.Right.IsSignaling";
    CM_ SG_ 288 BrakeIsActive "Vehicle.Body.Lights.Brake.IsActive";
  can_provider_defaults: |
    {
      "DirectionIndicatorLeft": 0,
      "DirectionIndicatorRight": 0,
      "BrakeIsActive": 0
    }
