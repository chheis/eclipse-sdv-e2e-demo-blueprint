apiVersion: v0.1
workloads:
  mosquitto-broker:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    configs:
      mosquitto_conf: mosquitto_config
    files:
      - mountPoint: "/mosquitto/config/mosquitto.conf" # mount point in the container
        data: "{{mosquitto_conf}}" 
    runtimeConfig: |
      image: docker.io/eclipse-mosquitto:latest
      commandOptions: ["--net=host"]
  kuksa-databroker:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    runtimeConfig: |
      image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.6.0
      commandArgs: ["--insecure"]
      commandOptions: ["--net=host"]
      volumes:
        - /opt/kuksa/vss:/data:ro
  kuksa-can-provider:
    runtime: podman
    agent: agent_B
    restartPolicy: ALWAYS
    runtimeConfig: |
      image: ghcr.io/eclipse-kuksa/kuksa-can-provider/can-provider:0.4.4
      network: host
      privileged: true
      commandArgs: ["--config", "/config/can-provider-config.json"]
      volumes:
        - /opt/kuksa/can-provider:/config:ro
configs:
  mosquitto_config: |
    listener 1883 0.0.0.0
    allow_anonymous true
